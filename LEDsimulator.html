<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Синий светодиод - Симулятор</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            overflow-x: hidden;
        }
        h2 { margin: 0 0 20px; font-size: 1.4rem; text-align: center; text-transform: uppercase; }
        
        /* Сам диод */
        .led-container {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .led-bulb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #222;
            border: 2px solid #555;
            transition: all 0.1s ease;
            box-shadow: 0 0 0 rgba(0,0,0,0);
        }
        .led-base {
            width: 40px;
            height: 30px;
            background-color: #555;
            position: absolute;
            bottom: 10px;
            border-radius: 5px;
            z-index: -1;
        }
        .led-legs {
            width: 20px;
            height: 40px;
            border-left: 4px solid #888;
            border-right: 4px solid #888;
            position: absolute;
            bottom: -20px;
            z-index: -2;
        }

        /* Управление */
        .slider-container {
            width: 100%;
            max-width: 600px;
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
        }
        .slider-container label {
            display: block;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            touch-action: none; 
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 10px;
            background: #30363d;
            border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: #fff;
            margin-top: -10px;
            cursor: pointer;
            border: 3px solid #1f6feb;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Инфо панель */
        .info-panel {
            width: 100%;
            max-width: 600px;
            background: #21262d;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-sizing: border-box;
            font-size: 1.1rem;
            line-height: 1.6;
            position: relative;
        }
        .val-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #30363d;
            padding: 8px 0;
        }
        .val-row:last-child { border-bottom: none; }
        .val-label { color: #8b949e; }
        .val-data { font-weight: bold; color: #fff; }
        
        #materialDesc {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #c9d1d9;
            min-height: 60px;
        }

        .nobel-badge {
            display: none;
            position: absolute;
            top: -15px;
            right: -10px;
            background: #d4af37;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            transform: rotate(10deg);
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.4);
            animation: pop 0.3s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(10deg); }
            100% { transform: scale(1) rotate(10deg); }
        }
    </style>
</head>
<body>

    <h2>Энергия vs Цвет диода</h2>

    <div class="led-container">
        <div class="led-bulb" id="ledBulb"></div>
        <div class="led-base"></div>
        <div class="led-legs"></div>
    </div>

    <div class="slider-container">
        <label for="evSlider">Ширина запрещенной зоны: <span id="evVal">1.20</span> эВ</label>
        <input type="range" id="evSlider" min="1.2" max="4.0" step="0.05" value="1.2">
    </div>

    <div class="info-panel">
        <div class="nobel-badge" id="nobelBadge">🏆 Нобелевка (2014)!</div>
        
        <div class="val-row">
            <span class="val-label">Длина волны:</span>
            <span class="val-data"><span id="wlVal">1033</span> нм</span>
        </div>
        <div class="val-row">
            <span class="val-label">Материал:</span>
            <span class="val-data" id="matVal">GaAs</span>
        </div>
        
        <div id="materialDesc">Инфракрасный диапазон. Глазом не видно. Используется в пультах от телека.</div>
    </div>

<script>
    const slider = document.getElementById('evSlider');
    const evValSpan = document.getElementById('evVal');
    const wlValSpan = document.getElementById('wlVal');
    const matValSpan = document.getElementById('matVal');
    const descSpan = document.getElementById('materialDesc');
    const ledBulb = document.getElementById('ledBulb');
    const nobelBadge = document.getElementById('nobelBadge');

    // Функция перевода длины волны в цвет (упрощенная для физики видимого спектра)
    function nmToRGB(wl) {
        let r = 0, g = 0, b = 0, alpha = 1;
        
        if (wl >= 380 && wl < 440) { r = -(wl - 440) / (440 - 380); b = 1; }
        else if (wl >= 440 && wl < 490) { g = (wl - 440) / (490 - 440); b = 1; }
        else if (wl >= 490 && wl < 510) { g = 1; b = -(wl - 510) / (510 - 490); }
        else if (wl >= 510 && wl < 580) { r = (wl - 510) / (580 - 510); g = 1; }
        else if (wl >= 580 && wl < 645) { r = 1; g = -(wl - 645) / (645 - 580); }
        else if (wl >= 645 && wl <= 780) { r = 1; }
        
        // Инфракрасный и Ультрафиолет делаем тусклыми (мы их не видим)
        if (wl > 750) { r = 0.5; alpha = 0.1; } 
        if (wl < 400) { r = 0.3; b = 0.5; alpha = 0.2; }

        return `rgba(${Math.round(r*255)}, ${Math.round(g*255)}, ${Math.round(b*255)}, ${alpha})`;
    }

    function updateSim() {
        const ev = parseFloat(slider.value);
        const wl = Math.round(1240 / ev); // Перевод эВ в нм
        
        evValSpan.innerText = ev.toFixed(2);
        wlValSpan.innerText = wl;

        let matName = "";
        let desc = "";
        let showNobel = false;

        if (ev < 1.6) {
            matName = "Арсенид галлия (GaAs)";
            desc = "Инфракрасный диапазон. Глазом почти не видно. Старые добрые диоды для пультов ДУ.";
        } else if (ev >= 1.6 && ev < 2.0) {
            matName = "Фосфид-арсенид галлия (GaAsP)";
            desc = "Красный и желтый цвета. Классика индикаторов из 70-х годов.";
        } else if (ev >= 2.0 && ev < 2.4) {
            matName = "Фосфид галлия (GaP)";
            desc = "Зеленый цвет. Технология отработана, делается без проблем.";
        } else if (ev >= 2.4 && ev < 2.8) {
            matName = "Селенид цинка (ZnSe)";
            desc = "Голубой цвет. Огромная проблема: кристалл быстро деградирует (сгорает) от собственных дефектов.";
        } else if (ev >= 2.8 && ev <= 3.4) {
            matName = "Нитрид галлия (GaN)";
            desc = "Синий цвет! Тот самый материал, который никто не мог вырастить 30 лет. Позволил создать белые LED-лампы.";
            showNobel = true;
        } else {
            matName = "Нитрид алюминия-галлия (AlGaN)";
            desc = "Ультрафиолет. Энергия фотона огромная, пробивает бактерии и вирусы.";
        }

        matValSpan.innerText = matName;
        descSpan.innerText = desc;
        nobelBadge.style.display = showNobel ? 'block' : 'none';

        // Обновляем свечение
        const color = nmToRGB(wl);
        if (wl > 750 || wl < 380) {
            // Невидимый спектр - светит еле-еле
            ledBulb.style.backgroundColor = '#333';
            ledBulb.style.boxShadow = `0 0 15px ${color}`;
            ledBulb.style.borderColor = '#444';
        } else {
            // Видимый спектр - ебашит на полную
            ledBulb.style.backgroundColor = color.replace(/[^,]+(?=\))/, '1'); // forced alpha 1 for bg
            ledBulb.style.boxShadow = `0 0 50px 10px ${color}, inset 0 0 20px #fff`;
            ledBulb.style.borderColor = '#fff';
        }
    }

    slider.addEventListener('input', updateSim);
    
    // Инит при загрузке
    updateSim();
</script>
