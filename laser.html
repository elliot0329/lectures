<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квантовая яма: Лазер vs Светодиод</title>
    <style>
        body { 
            background-color: #0d0d12; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        h2 { margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,200,0,0.5); }
        .container {
            display: flex;
            gap: 30px;
            background: #141419;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #2a2a35;
        }
        canvas { 
            background-color: #050508; 
            border-radius: 8px; 
            border: 2px solid #333;
            box-shadow: inset 0 0 30px rgba(255,100,0,0.05);
        }
        .controls { 
            width: 320px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            background: #1a1a22;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ffaa00;
        }
        label { font-weight: bold; color: #ffaa00; display: block; margin-bottom: 10px; font-size: 1.1rem;}
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffaa00; }
        
        button {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover { background: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.6); }

        .desc {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.5;
            background: #1a1a22;
            padding: 15px;
            border-radius: 8px;
        }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Квантовая яма: Индуцированное излучение</h2>
    
    <div class="container">
        <canvas id="laserCanvas" width="600" height="400"></canvas>
        
        <div class="controls">
            <div class="control-group">
                <label>Накачка (Инверсия населенностей)</label>
                <input type="range" id="pumpSlider" min="0" max="100" value="10">
                <div style="text-align: right; margin-top: 5px; color: #888;" id="pumpVal">10%</div>
            </div>

            <button onclick="injectPhoton()">Запустить фотон</button>

            <div class="desc">
                <span class="highlight">Низкая накачка:</span> Спонтанное излучение. Электроны падают сами, фотоны летят хаотично (Светодиод).<br><br>
                <span class="highlight">Максимальная накачка:</span> Создается инверсия. Запустите фотон, чтобы увидеть цепную реакцию индуцированного излучения (Лазер).
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('laserCanvas');
        const ctx = canvas.getContext('2d');
        const pumpSlider = document.getElementById('pumpSlider');
        const pumpVal = document.getElementById('pumpVal');

        const E1_Y = 320; // Нижний уровень
        const E2_Y = 120; // Верхний уровень
        
        const numElectrons = 70;
        let electrons = [];
        let photons = [];

        // Инициализация электронов
        for(let i = 0; i < numElectrons; i++) {
            electrons.push({
                x: 50 + Math.random() * 500,
                y: E1_Y,
                targetY: E1_Y,
                state: 'E1', // E1 или E2
                energyTimer: 0
            });
        }

        function injectPhoton() {
            // Спавним стартовый триггерный фотон слева
            photons.push({
                x: 0,
                y: E2_Y,
                vx: 8, // Летит строго вправо
                vy: 0,
                type: 'coherent',
                life: 1.0
            });
        }

        function drawLevel(y, label) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]);
            ctx.beginPath();
            ctx.moveTo(30, y);
            ctx.lineTo(570, y);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#fff';
            ctx.font = '16px monospace';
            ctx.fillText(label, 10, y + 5);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let pumpRate = pumpSlider.value / 100;
            pumpVal.innerText = pumpSlider.value + "%";

            // Отрисовка энергетических уровней
            drawLevel(E2_Y, "E2");
            drawLevel(E1_Y, "E1");

            // Логика электронов
            ctx.fillStyle = '#00e5ff'; // Синие электроны
            electrons.forEach(e => {
                
                // Накачка: шанс запрыгнуть на E2
                if (e.state === 'E1' && Math.random() < pumpRate * 0.05) {
                    e.state = 'E2';
                    e.targetY = E2_Y;
                    e.energyTimer = 50 + Math.random() * 150; // Время жизни на верху
                }

                // Спонтанное падение с E2 на E1
                if (e.state === 'E2') {
                    e.energyTimer--;
                    if (e.energyTimer <= 0) {
                        e.state = 'E1';
                        e.targetY = E1_Y;
                        
                        // РОЖДЕНИЕ СПОНТАННОГО ФОТОНА (летит рандомно)
                        let angle = Math.random() * Math.PI * 2;
                        photons.push({
                            x: e.x, y: e.y,
                            vx: Math.cos(angle) * 4,
                            vy: Math.sin(angle) * 4,
                            type: 'spontaneous',
                            life: 1.0
                        });
                    }
                }

                // Плавное перемещение электрона между уровнями
                e.y += (e.targetY - e.y) * 0.2;

                // Небольшое дрожание для живости
                let renderX = e.x + (Math.random() - 0.5) * 2;
                let renderY = e.y + (Math.random() - 0.5) * 2;

                ctx.beginPath();
                ctx.arc(renderX, renderY, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Логика фотонов
            for (let i = photons.length - 1; i >= 0; i--) {
                let p = photons[i];
                p.x += p.vx;
                p.y += p.vy;

                // Индуцированное излучение (ТОЛЬКО для когерентных фотонов, летящих по уровню E2)
                if (p.type === 'coherent') {
                    electrons.forEach(e => {
                        // Если фотон пролетает мимо возбужденного электрона
                        if (e.state === 'E2' && Math.abs(p.x - e.x) < 10 && Math.abs(p.y - e.y) < 10) {
                            // Сбиваем электрон вниз
                            e.state = 'E1';
                            e.targetY = E1_Y;
                            
                            // РОЖДЕНИЕ ИНДУЦИРОВАННОГО ФОТОНА (клон)
                            photons.push({
                                x: e.x, y: e.y,
                                vx: p.vx, // Точно такая же скорость и направление
                                vy: p.vy,
                                type: 'coherent',
                                life: 1.0
                            });
                        }
                    });
                }

                // Отрисовка фотона (желтая светящаяся хуйня)
                ctx.fillStyle = p.type === 'coherent' ? '#ff0000' : '#ffaa00'; // Лазерный луч красный, обычные желтые
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // Хвост (трек)
                ctx.strokeStyle = ctx.fillStyle;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - p.vx*3, p.y - p.vy*3);
                ctx.stroke();

                ctx.shadowBlur = 0; // Сброс теней

                // Удаление фотонов, улетевших за экран
                if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) {
                    photons.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
